
services:
  mysql-ticketsystem:
    image: mysql:8.0
    container_name: ticketsystem-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ticketsystem_db
      MYSQL_USER: ticketuser
      MYSQL_PASSWORD: ticketpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: