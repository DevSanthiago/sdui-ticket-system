services:
  ticketsystem-api:
    image: ${IMAGE_BACKEND}
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      TZ: America/Sao_Paulo
    volumes:
      - /var/www/sync-ticket/back-end/appsettings.json:/app/appsettings.json:ro
    restart: unless-stopped
    networks:
      - syncticket-net

  ticketsystem-web:
    image: ${IMAGE_FRONTEND}
    ports:
      - "8085:8080"
    environment:
      TZ: America/Sao_Paulo
    restart: unless-stopped
    depends_on:
      - ticketsystem-api
    networks:
      - syncticket-net

networks:
  syncticket-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
