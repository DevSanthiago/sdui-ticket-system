# Necessario para o upgrade WebSocket do SignalR (/hubs/).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # DNS interno do Docker: resolve o nome do container do backend em runtime,
    # sobrevive a restart do back (IP novo) sem precisar recarregar o nginx.
    resolver 127.0.0.11 valid=10s;

    # SPA: rota desconhecida cai no index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API -> container do backend (porta interna 8080), pela rede do compose.
    location /api/ {
        set $upstream_api ticketsystem-api:8080;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hub SignalR -> backend, COM upgrade WebSocket e timeout longo.
    # proxy_pass com variavel repassa a URI original (mantem o ?access_token=).
    location /hubs/ {
        set $upstream_hub ticketsystem-api:8080;
        proxy_pass http://$upstream_hub;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}